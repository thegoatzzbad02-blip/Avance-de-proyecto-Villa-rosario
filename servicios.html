<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios Públicos - Villa Rosario</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">...</nav>

    <header class="page-header">
        <div class="container">
            <h1>Servicios Públicos</h1>
            <p>Estado actual y gestiones</p>
        </div>
    </header>

    <main>
        <div class="container">
            <!-- Grid de servicios con IDs específicos para actualización dinámica -->
            <div class="servicios-estado">
                <div id="servicio-agua" class="servicio-estado">
                    <div class="servicio-header"><i class="fas fa-tint"></i><h3>Agua Potable</h3></div>
                    <div class="servicio-info">
                        <span class="estado-badge"></span>
                        <p class="texto-extra"></p>
                    </div>
                </div>
                <div id="servicio-electricidad" class="servicio-estado">
                    <div class="servicio-header"><i class="fas fa-bolt"></i><h3>Electricidad</h3></div>
                    <div class="servicio-info">
                        <span class="estado-badge"></span>
                        <p class="texto-extra"></p>
                    </div>
                </div>
                <div id="servicio-aseo" class="servicio-estado">
                    <div class="servicio-header"><i class="fas fa-trash-alt"></i><h3>Aseo Urbano</h3></div>
                    <div class="servicio-info">
                        <span class="estado-badge"></span>
                        <p class="texto-extra"></p>
                    </div>
                </div>
                <div id="servicio-internet" class="servicio-estado">
                    <div class="servicio-header"><i class="fas fa-wifi"></i><h3>Internet</h3></div>
                    <div class="servicio-info">
                        <span class="estado-badge"></span>
                        <p class="texto-extra"></p>
                    </div>
                </div>
            </div>

            <!-- Historial de gestiones -->
            <section style="margin: 3rem 0;">
                <h2>Gestiones Recientes</h2>
                <div id="gestiones-lista"></div>
            </section>
        </div>
    </main>

    <div class="footer-bottom">
                <p>&copy; 2024 Comunidad Villa Rosario. Proyecto UPTOS Clodosbaldo Russián.</p>
                <p>Cumaná, Estado Sucre - República Bolivariana de Venezuela</p>
            </div>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
