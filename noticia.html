<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticia - Villa Rosario</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navegación (igual) -->
    <nav class="navbar">...</nav>

    <main>
        <div class="container" style="max-width: 900px; margin: 2rem auto;">
            <!-- Aquí se inyectará el contenido de la noticia desde main.js -->
            <div id="noticia-completa"></div>

            <!-- Botones para compartir -->
            <div class="compartir-noticia">
                <span class="compartir-titulo"><i class="fas fa-share-alt"></i> Compartir esta noticia:</span>
                <div class="compartir-botones">
                    <a href="#" class="compartir-btn compartir-wsp" id="share-wsp" target="_blank">
                        <i class="fab fa-whatsapp"></i> <span>WhatsApp</span>
                    </a>
                    <a href="#" class="compartir-btn compartir-fb" id="share-fb" target="_blank">
                        <i class="fab fa-facebook-f"></i> <span>Facebook</span>
                    </a>
                    <a href="#" class="compartir-btn compartir-tw" id="share-tw" target="_blank">
                        <i class="fab fa-twitter"></i> <span>Twitter</span>
                    </a>
                    <button class="compartir-btn compartir-copy" id="copy-link">
                        <i class="fas fa-link"></i> <span>Copiar enlace</span>
                    </button>
                </div>
                <div id="copyMessage" class="copy-message">¡Enlace copiado!</div>
            </div>
        </div>
    </main>

    <div class="footer-bottom">
                <p>&copy; 2024 Comunidad Villa Rosario. Proyecto UPTOS Clodosbaldo Russián.</p>
                <p>Cumaná, Estado Sucre - República Bolivariana de Venezuela</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
